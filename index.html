<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      text-align: center;
      color: #1a1a2e;
      font-size: 2rem;
      margin-bottom: 24px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #6c63ff;
    }

    .input-area button {
      padding: 12px 20px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.4rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #574fd6;
    }

    .input-area button:disabled {
      background: #bbb;
      cursor: not-allowed;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 0.85rem;
      color: #666;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #6c63ff;
      color: #6c63ff;
      font-weight: 600;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 14px 16px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item span {
      flex: 1;
      font-size: 0.97rem;
      color: #333;
      word-break: break-word;
    }

    .todo-item.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .todo-item .delete-btn:hover {
      color: #e74c3c;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #999;
    }

    .footer button {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .footer button:hover {
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      color: #bbb;
      margin-top: 32px;
      font-size: 0.95rem;
    }

    .error-msg {
      background: #fee;
      color: #c0392b;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      color: #aaa;
      padding: 24px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapılacaklar</h1>

    <div id="errorBox" class="error-msg" style="display:none;"></div>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." maxlength="200">
      <button id="addBtn" title="Ekle">+</button>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">Tümü</button>
      <button data-filter="active">Aktif</button>
      <button data-filter="done">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todoList"><li class="loading">Yükleniyor...</li></ul>

    <div class="footer">
      <span id="countInfo"></span>
      <button id="clearDone">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://aheirbjxpvmgucxftwty.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoZWlyYmp4cHZtZ3VjeGZ0d3R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTI0MDcsImV4cCI6MjA5MzcyODQwN30.NMYyEI03cme4OFGWt8ph99exGbnCwX9f6sCTl60IviQ';

    const API = `${SUPABASE_URL}/rest/v1/todos`;
    const HEADERS = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=representation'
    };

    let todos = [];
    let filter = 'all';

    const input    = document.getElementById('todoInput');
    const addBtn   = document.getElementById('addBtn');
    const list     = document.getElementById('todoList');
    const countEl  = document.getElementById('countInfo');
    const errorBox = document.getElementById('errorBox');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
      setTimeout(() => { errorBox.style.display = 'none'; }, 4000);
    }

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, { ...options, headers: { ...HEADERS, ...options.headers } });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    async function loadTodos() {
      try {
        todos = await apiFetch(`${API}?order=created_at.desc`);
        render();
      } catch (e) {
        showError('Görevler yüklenemedi: ' + e.message);
        list.innerHTML = '<li class="empty">Yüklenemedi</li>';
      }
    }

    async function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      addBtn.disabled = true;
      try {
        const [newTodo] = await apiFetch(API, {
          method: 'POST',
          body: JSON.stringify({ text })
        });
        todos.unshift(newTodo);
        input.value = '';
        render();
      } catch (e) {
        showError('Görev eklenemedi: ' + e.message);
      } finally {
        addBtn.disabled = false;
      }
    }

    async function toggleTodo(id, done) {
      try {
        const [updated] = await apiFetch(`${API}?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ done })
        });
        const idx = todos.findIndex(t => t.id === id);
        if (idx !== -1) todos[idx] = updated;
        render();
      } catch (e) {
        showError('Güncelleme başarısız: ' + e.message);
        render();
      }
    }

    async function deleteTodo(id) {
      try {
        await apiFetch(`${API}?id=eq.${id}`, { method: 'DELETE', headers: { 'Prefer': '' } });
        todos = todos.filter(t => t.id !== id);
        render();
      } catch (e) {
        showError('Silme başarısız: ' + e.message);
      }
    }

    async function clearDone() {
      const doneIds = todos.filter(t => t.done).map(t => t.id);
      if (!doneIds.length) return;
      try {
        await apiFetch(`${API}?id=in.(${doneIds.join(',')})`, { method: 'DELETE', headers: { 'Prefer': '' } });
        todos = todos.filter(t => !t.done);
        render();
      } catch (e) {
        showError('Silme başarısız: ' + e.message);
      }
    }

    function render() {
      const visible = todos.filter(t =>
        filter === 'all'    ? true :
        filter === 'active' ? !t.done :
                               t.done
      );

      list.innerHTML = '';

      if (visible.length === 0) {
        list.innerHTML = '<li class="empty">Görev yok</li>';
      } else {
        visible.forEach(todo => {
          const li = document.createElement('li');
          li.className = 'todo-item' + (todo.done ? ' done' : '');
          li.innerHTML = `
            <input type="checkbox" ${todo.done ? 'checked' : ''} data-id="${todo.id}">
            <span>${escapeHtml(todo.text)}</span>
            <button class="delete-btn" data-id="${todo.id}" title="Sil">✕</button>
          `;
          list.appendChild(li);
        });
      }

      const remaining = todos.filter(t => !t.done).length;
      countEl.textContent = `${remaining} görev kaldı`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    list.addEventListener('change', e => {
      if (e.target.type === 'checkbox') {
        toggleTodo(Number(e.target.dataset.id), e.target.checked);
      }
    });

    list.addEventListener('click', e => {
      if (e.target.classList.contains('delete-btn')) {
        deleteTodo(Number(e.target.dataset.id));
      }
    });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    document.getElementById('clearDone').addEventListener('click', clearDone);

    loadTodos();
  </script>
</body>
</html>
